proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
proxy_read_timeout 60s;
proxy_send_timeout 60s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

# Browser reverse proxy.
server {
    listen 3000;
    server_name localhost 127.0.0.1;

    location / {
        proxy_pass http://web-frontend:3000;
    }
}

# Unity support-service reverse proxy. TLS terminates here; support runs HTTP inside Docker.
server {
    listen 8000 ssl;
    server_name localhost 127.0.0.1;

    ssl_certificate /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://support:8000;
    }
}

# Unity matchmaking reverse proxy. TLS terminates here; matchmaking runs HTTP inside Docker.
server {
    listen 8001 ssl;
    server_name localhost 127.0.0.1;

    ssl_certificate /etc/nginx/certs/local.crt;
    ssl_certificate_key /etc/nginx/certs/local.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://matchmaking:8001;
    }
}
