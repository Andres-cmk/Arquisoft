<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Crear Cuenta</title>
	<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
	<main class="page">
		<section class="card">
			<h1>RTS ArquiSoft</h1>

			<form id="register-form" class="form" autocomplete="off">
				<label for="username">Usuario</label>
				<input id="username" name="username" type="text" maxlength="20" required>

				<label for="password">Contrasena</label>
				<input id="password" name="password" type="password" maxlength="255" required>

				<button type="submit">Crear cuenta</button>
			</form>

			<p id="feedback" class="feedback" aria-live="polite"></p>
		</section>
	</main>

	<script>
		const form = document.getElementById("register-form");
		const feedback = document.getElementById("feedback");

		form.addEventListener("submit", async (event) => {
			event.preventDefault();

			const payload = {
				username: form.username.value.trim(),
				password: form.password.value
			};

			feedback.textContent = "Procesando...";
			feedback.classList.remove("error", "success");

			try {
				const response = await fetch("/auth/users", {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify(payload)
				});

				const result = await response.json();

				if (!response.ok) {
					throw new Error(result.detail || "No se pudo crear la cuenta");
				}

				feedback.textContent = "Cuenta creada correctamente";
				feedback.classList.add("success");
				form.reset();
			} catch (error) {
				feedback.textContent = error.message;
				feedback.classList.add("error");
			}
		});
	</script>
</body>
</html>
